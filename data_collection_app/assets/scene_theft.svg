<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 130">
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1c1917"/><stop offset="100%" stop-color="#292524"/></linearGradient>
  <radialGradient id="moonGlow" cx="85%" cy="20%"><stop offset="0%" stop-color="#fef3c7" stop-opacity="0.1"/><stop offset="100%" stop-color="transparent"/></radialGradient>
</defs>
<rect width="400" height="130" fill="url(#sky)"/>
<rect width="400" height="130" fill="url(#moonGlow)"/>
<!-- Moon -->
<circle cx="350" cy="22" r="10" fill="#fef3c7" opacity="0.8"/>
<circle cx="354" cy="20" r="8" fill="#1c1917"/>
<!-- Stars -->
<circle cx="30" cy="12" r="0.8" fill="white" opacity="0.4"/><circle cx="80" cy="25" r="0.6" fill="white" opacity="0.3"/>
<circle cx="150" cy="8" r="1" fill="white" opacity="0.5"/><circle cx="250" cy="15" r="0.7" fill="white" opacity="0.35"/>
<circle cx="300" cy="30" r="0.8" fill="white" opacity="0.3"/>
<!-- Alley buildings -->
<rect x="0" y="20" width="50" height="110" fill="#1f2937"/>
<rect x="5" y="30" width="12" height="10" rx="1" fill="#fbbf24" opacity="0.15"/>
<rect x="25" y="30" width="12" height="10" rx="1" fill="#0f172a"/>
<rect x="5" y="50" width="12" height="10" rx="1" fill="#0f172a"/>
<rect x="25" y="50" width="12" height="10" rx="1" fill="#fbbf24" opacity="0.1"/>
<rect x="350" y="25" width="50" height="105" fill="#1f2937"/>
<rect x="358" y="35" width="10" height="8" rx="1" fill="#0f172a"/>
<rect x="375" y="35" width="10" height="8" rx="1" fill="#fbbf24" opacity="0.12"/>
<rect x="358" y="52" width="10" height="8" rx="1" fill="#fbbf24" opacity="0.1"/>
<!-- Alley ground -->
<rect x="50" y="100" width="300" height="30" fill="#292524"/>
<!-- Broken door -->
<g transform="translate(80,50)">
  <rect x="0" y="0" width="30" height="50" fill="#44403c"/>
  <rect x="2" y="2" width="26" height="46" fill="#292524"/>
  <!-- Broken lock -->
  <circle cx="24" cy="25" r="3" fill="#78716c"/>
  <path d="M22,22 L28,28" stroke="#ef4444" stroke-width="1.5"/>
  <!-- Crack lines -->
  <path d="M5,10 L15,15 L8,25" fill="none" stroke="#44403c" stroke-width="0.8"/>
</g>
<!-- Flashlight beam -->
<polygon points="150,60 220,40 240,80" fill="#fef3c7" opacity="0.06"/>
<polygon points="150,60 210,45 230,72" fill="#fef3c7" opacity="0.04"/>
<!-- Running thief silhouette -->
<g transform="translate(260,55)">
  <circle cx="8" cy="0" r="6" fill="#0f172a"/>
  <rect x="3" y="6" width="10" height="18" rx="2" fill="#0f172a"/>
  <!-- Running legs -->
  <path d="M5,24 L-2,38" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
  <path d="M11,24 L18,36" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
  <!-- Arms -->
  <path d="M3,10 L-5,18" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
  <path d="M13,10 L22,6" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
  <!-- Bag -->
  <rect x="16" y="2" width="10" height="8" rx="2" fill="#1f2937"/>
</g>
<!-- Scattered items -->
<rect x="180" y="105" width="6" height="4" rx="1" fill="#6b7280" transform="rotate(20 183 107)"/>
<circle cx="200" cy="108" r="2" fill="#a8a29e" opacity="0.5"/>
<rect x="215" y="110" width="8" height="3" rx="0.5" fill="#6b7280" transform="rotate(-15 219 111)"/>
<!-- Street lamp -->
<rect x="318" y="35" width="3" height="65" fill="#4b5563"/>
<ellipse cx="320" cy="35" rx="8" ry="4" fill="#fef3c7" opacity="0.15"/>
<rect x="314" y="32" width="12" height="5" rx="2" fill="#6b7280"/>
<circle cx="320" cy="34" r="2" fill="#fbbf24" opacity="0.6"/>
</svg>

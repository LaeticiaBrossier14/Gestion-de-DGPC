<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 130">
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#292524"/><stop offset="100%" stop-color="#44403c"/></linearGradient>
  <linearGradient id="dust" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#78716c" stop-opacity="0.4"/><stop offset="100%" stop-color="transparent"/></linearGradient>
</defs>
<rect width="400" height="130" fill="url(#sky)"/>
<!-- Standing building (left) -->
<g transform="translate(20,15)">
  <rect x="0" y="0" width="55" height="105" rx="2" fill="#44403c" stroke="#57534e" stroke-width="0.5"/>
  <rect x="5" y="6" width="10" height="8" rx="1" fill="#fbbf24" opacity="0.2"/>
  <rect x="20" y="6" width="10" height="8" rx="1" fill="#292524"/>
  <rect x="35" y="6" width="10" height="8" rx="1" fill="#fbbf24" opacity="0.15"/>
  <rect x="5" y="20" width="10" height="8" rx="1" fill="#292524"/>
  <rect x="20" y="20" width="10" height="8" rx="1" fill="#fbbf24" opacity="0.1"/>
  <rect x="35" y="20" width="10" height="8" rx="1" fill="#292524"/>
  <rect x="5" y="34" width="10" height="8" rx="1" fill="#292524"/>
  <rect x="20" y="34" width="10" height="8" rx="1" fill="#292524"/>
  <rect x="35" y="34" width="10" height="8" rx="1" fill="#292524"/>
</g>
<!-- Collapsing building (center) -->
<g transform="translate(100,20)">
  <rect x="0" y="0" width="60" height="50" rx="2" fill="#57534e" transform="rotate(8 30 50)"/>
  <!-- Cracks -->
  <path d="M15,10 L20,20 L17,30 L22,42" fill="none" stroke="#1c1917" stroke-width="1.5"/>
  <path d="M35,5 L32,18 L38,28" fill="none" stroke="#1c1917" stroke-width="1.2"/>
  <!-- Falling pieces -->
  <rect x="45" y="35" width="8" height="6" fill="#78716c" transform="rotate(25 49 38)"/>
  <rect x="55" y="45" width="6" height="5" fill="#78716c" transform="rotate(-15 58 47)"/>
  <rect x="30" y="52" width="10" height="4" fill="#78716c" transform="rotate(40 35 54)"/>
</g>
<!-- Rubble pile -->
<g transform="translate(90,85)">
  <polygon points="0,25 20,10 35,18 50,8 70,15 90,5 110,12 130,25" fill="#57534e"/>
  <polygon points="10,25 25,15 40,20 55,12 75,18 100,25" fill="#78716c"/>
  <!-- Rebar sticking out -->
  <line x1="30" y1="15" x2="35" y2="2" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="60" y1="10" x2="58" y2="-5" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="85" y1="12" x2="90" y2="0" stroke="#6b7280" stroke-width="1"/>
</g>
<!-- Dust cloud -->
<rect width="400" height="130" fill="url(#dust)"/>
<ellipse cx="160" cy="75" rx="50" ry="20" fill="#a8a29e" opacity="0.2"/>
<ellipse cx="200" cy="65" rx="40" ry="15" fill="#a8a29e" opacity="0.15"/>
<ellipse cx="130" cy="80" rx="35" ry="12" fill="#a8a29e" opacity="0.18"/>
<!-- Crane -->
<g transform="translate(260,5)">
  <rect x="0" y="80" width="16" height="35" fill="#f59e0b" opacity="0.7"/>
  <line x1="8" y1="0" x2="8" y2="80" stroke="#f59e0b" stroke-width="3" opacity="0.7"/>
  <line x1="8" y1="0" x2="80" y2="0" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  <line x1="80" y1="0" x2="80" y2="20" stroke="#374151" stroke-width="1"/>
  <!-- Support cables -->
  <line x1="8" y1="0" x2="40" y2="15" stroke="#6b7280" stroke-width="0.8" opacity="0.5"/>
  <line x1="40" y1="0" x2="8" y2="15" stroke="#6b7280" stroke-width="0.8" opacity="0.5"/>
</g>
<!-- Emergency worker silhouette -->
<g transform="translate(230,72)">
  <circle cx="8" cy="0" r="5" fill="#f59e0b"/>
  <rect x="3" y="5" width="10" height="16" rx="2" fill="#1e40af"/>
  <rect x="3" y="20" width="4" height="10" fill="#1e40af"/>
  <rect x="9" y="20" width="4" height="10" fill="#1e40af"/>
</g>
<g transform="translate(250,75)">
  <circle cx="6" cy="0" r="4" fill="#f59e0b"/>
  <rect x="2" y="4" width="8" height="14" rx="2" fill="#1e40af"/>
  <rect x="2" y="17" width="3" height="8" fill="#1e40af"/>
  <rect x="7" y="17" width="3" height="8" fill="#1e40af"/>
</g>
<!-- Warning tape -->
<g opacity="0.6">
  <line x1="80" y1="105" x2="220" y2="105" stroke="#f59e0b" stroke-width="2"/>
  <line x1="80" y1="105" x2="220" y2="105" stroke="#1c1917" stroke-width="2" stroke-dasharray="8 8"/>
</g>
</svg>

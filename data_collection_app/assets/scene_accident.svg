<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 130">
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e1b4b"/><stop offset="100%" stop-color="#312e81"/></linearGradient>
  <linearGradient id="road" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#374151"/><stop offset="100%" stop-color="#1f2937"/></linearGradient>
  <linearGradient id="fire" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#dc2626"/><stop offset="40%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fde68a"/></linearGradient>
  <radialGradient id="flash1" cx="30%" cy="70%"><stop offset="0%" stop-color="#ef4444" stop-opacity="0.3"/><stop offset="100%" stop-color="transparent"/></radialGradient>
  <radialGradient id="flash2" cx="70%" cy="70%"><stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2"/><stop offset="100%" stop-color="transparent"/></radialGradient>
</defs>
<!-- Sky -->
<rect width="400" height="130" fill="url(#sky)"/>
<rect width="400" height="130" fill="url(#flash1)"/>
<rect width="400" height="130" fill="url(#flash2)"/>
<!-- Stars -->
<circle cx="50" cy="15" r="1" fill="white" opacity="0.4"/><circle cx="120" cy="8" r="0.8" fill="white" opacity="0.3"/>
<circle cx="200" cy="20" r="1.2" fill="white" opacity="0.5"/><circle cx="310" cy="12" r="0.8" fill="white" opacity="0.3"/>
<circle cx="370" cy="22" r="1" fill="white" opacity="0.4"/>
<!-- Road -->
<rect x="0" y="85" width="400" height="45" fill="url(#road)"/>
<line x1="0" y1="107" x2="400" y2="107" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="16 10" opacity="0.5"/>
<!-- Car 1 (crashed, tilted) -->
<g transform="translate(120,72) rotate(-12)">
  <rect x="0" y="0" width="55" height="22" rx="5" fill="#dc2626"/>
  <rect x="8" y="-8" width="38" height="14" rx="4" fill="#dc2626" opacity="0.8"/>
  <rect x="12" y="-6" width="14" height="10" rx="2" fill="#bfdbfe" opacity="0.5"/>
  <rect x="28" y="-6" width="14" height="10" rx="2" fill="#bfdbfe" opacity="0.4"/>
  <circle cx="10" cy="24" r="6" fill="#1f2937" stroke="#374151" stroke-width="1.5"/>
  <circle cx="10" cy="24" r="2.5" fill="#4b5563"/>
  <circle cx="45" cy="24" r="6" fill="#1f2937" stroke="#374151" stroke-width="1.5"/>
  <circle cx="45" cy="24" r="2.5" fill="#4b5563"/>
  <rect x="48" y="4" width="6" height="4" rx="1" fill="#fbbf24" opacity="0.8"/>
</g>
<!-- Car 2 (crashed, opposite angle) -->
<g transform="translate(195,74) rotate(8)">
  <rect x="0" y="0" width="50" height="20" rx="5" fill="#1d4ed8"/>
  <rect x="6" y="-7" width="36" height="12" rx="3" fill="#1d4ed8" opacity="0.8"/>
  <rect x="10" y="-5" width="12" height="9" rx="2" fill="#bfdbfe" opacity="0.4"/>
  <rect x="24" y="-5" width="12" height="9" rx="2" fill="#bfdbfe" opacity="0.3"/>
  <circle cx="8" cy="22" r="5.5" fill="#1f2937" stroke="#374151" stroke-width="1.5"/>
  <circle cx="42" cy="22" r="5.5" fill="#1f2937" stroke="#374151" stroke-width="1.5"/>
</g>
<!-- Impact sparks -->
<line x1="175" y1="78" x2="170" y2="68" stroke="#fbbf24" stroke-width="1.5" opacity="0.8"/>
<line x1="178" y1="75" x2="182" y2="65" stroke="#fbbf24" stroke-width="1.2" opacity="0.7"/>
<line x1="180" y1="80" x2="186" y2="72" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
<circle cx="177" cy="76" r="3" fill="#fbbf24" opacity="0.4"/>
<!-- Glass debris -->
<rect x="165" y="90" width="3" height="2" fill="#93c5fd" opacity="0.4" transform="rotate(30 166 91)"/>
<rect x="172" y="95" width="2" height="3" fill="#93c5fd" opacity="0.3" transform="rotate(-20 173 96)"/>
<rect x="185" y="88" width="2.5" height="2" fill="#93c5fd" opacity="0.35" transform="rotate(45 186 89)"/>
<!-- Skid marks -->
<path d="M100,105 Q130,100 145,95" fill="none" stroke="#111" stroke-width="3" opacity="0.4"/>
<path d="M100,110 Q130,105 142,98" fill="none" stroke="#111" stroke-width="2.5" opacity="0.3"/>
<!-- Person on ground -->
<ellipse cx="270" cy="100" rx="12" ry="4" fill="#1f2937" opacity="0.5"/>
<ellipse cx="268" cy="97" rx="5" ry="3" fill="#d4a373"/>
<rect x="262" y="100" width="14" height="6" rx="2" fill="#6b7280"/>
<!-- Ambulance in distance -->
<g transform="translate(340,60) scale(0.6)">
  <rect x="0" y="0" width="45" height="25" rx="4" fill="white"/>
  <rect x="35" y="5" width="10" height="15" rx="2" fill="#bfdbfe" opacity="0.5"/>
  <circle cx="10" cy="27" r="5" fill="#374151"/>
  <circle cx="35" cy="27" r="5" fill="#374151"/>
  <line x1="18" y1="6" x2="18" y2="16" stroke="#ef4444" stroke-width="2.5"/>
  <line x1="13" y1="11" x2="23" y2="11" stroke="#ef4444" stroke-width="2.5"/>
  <!-- Siren light -->
  <rect x="8" y="-4" width="8" height="4" rx="2" fill="#ef4444" opacity="0.9"/>
  <rect x="20" y="-4" width="8" height="4" rx="2" fill="#3b82f6" opacity="0.9"/>
</g>
<!-- Traffic light -->
<rect x="48" y="40" width="3" height="50" fill="#374151"/>
<rect x="42" y="32" width="15" height="28" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
<circle cx="49.5" cy="40" r="3.5" fill="#ef4444" opacity="0.9"/>
<circle cx="49.5" cy="49" r="3.5" fill="#111" opacity="0.3"/>
<circle cx="49.5" cy="58" r="3.5" fill="#111" opacity="0.3"/>
</svg>

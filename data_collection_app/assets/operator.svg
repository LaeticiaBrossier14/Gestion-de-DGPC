<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#0f1d30"/></linearGradient>
  <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d4a373"/><stop offset="100%" stop-color="#c08b5c"/></linearGradient>
  <linearGradient id="uniform" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e3a8a"/><stop offset="100%" stop-color="#1e2d5a"/></linearGradient>
  <linearGradient id="screenGlow" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/><stop offset="100%" stop-color="#1e40af" stop-opacity="0.1"/></linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feComposite in="SourceGraphic" in2="blur"/></filter>
  <radialGradient id="ambientBlue" cx="50%" cy="40%"><stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/><stop offset="100%" stop-color="transparent"/></radialGradient>
</defs>
<!-- Background -->
<circle cx="60" cy="60" r="58" fill="url(#bg)" stroke="#2563eb" stroke-width="2" stroke-opacity="0.3"/>
<circle cx="60" cy="60" r="58" fill="url(#ambientBlue)"/>
<!-- Monitor screens behind -->
<rect x="14" y="18" width="28" height="20" rx="2" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
<rect x="16" y="20" width="24" height="12" rx="1" fill="#0c1425"/>
<line x1="18" y1="24" x2="34" y2="24" stroke="#3b82f6" stroke-width="0.6" opacity="0.5"/>
<line x1="18" y1="27" x2="30" y2="27" stroke="#10b981" stroke-width="0.6" opacity="0.4"/>
<line x1="18" y1="30" x2="36" y2="30" stroke="#f59e0b" stroke-width="0.6" opacity="0.3"/>
<rect x="78" y="22" width="26" height="18" rx="2" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
<rect x="80" y="24" width="22" height="10" rx="1" fill="#0c1425"/>
<!-- Waveform on right screen -->
<polyline points="82,29 84,27 86,31 88,26 90,30 92,28 94,32 96,27 98,29 100,28" fill="none" stroke="#10b981" stroke-width="0.7" opacity="0.6"/>
<!-- Neck -->
<rect x="52" y="62" width="16" height="14" rx="3" fill="url(#skin)"/>
<!-- Uniform body -->
<path d="M30,105 Q30,78 45,72 L60,68 L75,72 Q90,78 90,105 Z" fill="url(#uniform)"/>
<!-- Collar -->
<path d="M48,72 L60,80 L72,72 L75,75 L60,85 L45,75 Z" fill="#162557" stroke="#1e3a8a" stroke-width="0.5"/>
<!-- Epaulettes -->
<rect x="36" y="74" width="12" height="4" rx="1.5" fill="#2563eb" opacity="0.6"/>
<rect x="72" y="74" width="12" height="4" rx="1.5" fill="#2563eb" opacity="0.6"/>
<!-- Badge -->
<circle cx="52" cy="85" r="5" fill="#f59e0b" opacity="0.8"/>
<text x="52" y="87.5" text-anchor="middle" font-size="5" fill="#1e1e1e" font-weight="bold">PC</text>
<!-- Head -->
<ellipse cx="60" cy="48" rx="18" ry="20" fill="url(#skin)"/>
<!-- Hair -->
<path d="M42,42 Q42,26 60,26 Q78,26 78,42 Q78,36 70,34 Q60,30 50,34 Q42,36 42,42Z" fill="#1c1c1c"/>
<!-- Eyes -->
<ellipse cx="52" cy="46" rx="3" ry="3.2" fill="white"/>
<ellipse cx="68" cy="46" rx="3" ry="3.2" fill="white"/>
<circle cx="53" cy="46" r="1.8" fill="#1e293b"/>
<circle cx="69" cy="46" r="1.8" fill="#1e293b"/>
<circle cx="53.5" cy="45.5" r="0.6" fill="white"/>
<circle cx="69.5" cy="45.5" r="0.6" fill="white"/>
<!-- Eyebrows -->
<path d="M48,41 Q52,39 56,41" fill="none" stroke="#1c1c1c" stroke-width="1.2" stroke-linecap="round"/>
<path d="M64,41 Q68,39 72,41" fill="none" stroke="#1c1c1c" stroke-width="1.2" stroke-linecap="round"/>
<!-- Nose -->
<path d="M60,48 Q58,53 56,54 Q60,55 64,54 Q62,53 60,48" fill="#b8935a" opacity="0.5"/>
<!-- Confident smile -->
<path d="M53,57 Q57,61 60,61 Q63,61 67,57" fill="none" stroke="#8b6842" stroke-width="1" stroke-linecap="round"/>
<!-- Ears -->
<ellipse cx="41" cy="48" rx="3.5" ry="5" fill="url(#skin)"/>
<ellipse cx="79" cy="48" rx="3.5" ry="5" fill="url(#skin)"/>
<!-- Headset band -->
<path d="M38,44 Q38,24 60,22 Q82,24 82,44" fill="none" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
<!-- Headset ear cups -->
<rect x="34" y="40" width="8" height="14" rx="3" fill="#374151"/>
<rect x="35" y="42" width="6" height="10" rx="2" fill="#1f2937"/>
<rect x="78" y="40" width="8" height="14" rx="3" fill="#374151"/>
<rect x="79" y="42" width="6" height="10" rx="2" fill="#1f2937"/>
<!-- Microphone boom -->
<path d="M35,52 Q28,58 30,64 Q32,68 36,66" fill="none" stroke="#4b5563" stroke-width="2" stroke-linecap="round"/>
<!-- Mic capsule -->
<ellipse cx="35" cy="66" rx="4" ry="3" fill="#374151" stroke="#4b5563" stroke-width="0.5"/>
<ellipse cx="35" cy="66" rx="2.5" ry="1.8" fill="#1f2937"/>
<!-- Status LED on headset -->
<circle cx="37" cy="41" r="1.2" fill="#10b981" filter="url(#glow)"/>
</svg>

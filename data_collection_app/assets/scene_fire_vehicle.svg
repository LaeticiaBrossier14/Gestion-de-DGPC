<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 130">
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1c1917"/><stop offset="60%" stop-color="#451a03"/><stop offset="100%" stop-color="#7c2d12"/></linearGradient>
  <linearGradient id="fireG" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#dc2626"/><stop offset="50%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fef3c7" stop-opacity="0.8"/></linearGradient>
  <radialGradient id="heatGlow" cx="50%" cy="70%"><stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/><stop offset="100%" stop-color="transparent"/></radialGradient>
  <linearGradient id="road" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#374151"/><stop offset="100%" stop-color="#1f2937"/></linearGradient>
</defs>
<rect width="400" height="130" fill="url(#sky)"/>
<rect width="400" height="130" fill="url(#heatGlow)"/>
<!-- Road -->
<rect x="0" y="90" width="400" height="40" fill="url(#road)"/>
<!-- Burning car -->
<g transform="translate(140,58)">
  <rect x="0" y="8" width="60" height="24" rx="6" fill="#78350f" opacity="0.7"/>
  <rect x="8" y="0" width="42" height="16" rx="4" fill="#78350f" opacity="0.6"/>
  <!-- Broken windows -->
  <rect x="12" y="2" width="14" height="10" rx="2" fill="#f59e0b" opacity="0.3"/>
  <rect x="30" y="2" width="14" height="10" rx="2" fill="#f59e0b" opacity="0.2"/>
  <!-- Wheels -->
  <circle cx="14" cy="34" r="6" fill="#1c1917"/>
  <circle cx="48" cy="34" r="6" fill="#1c1917"/>
  <!-- FLAMES -->
  <path d="M10,-5 Q15,-25 20,-10 Q25,-35 30,-8 Q35,-30 38,-12 Q42,-28 48,-5 Q50,-20 55,-2 L55,10 L10,10Z" fill="url(#fireG)" opacity="0.9"/>
  <path d="M15,0 Q18,-18 22,-5 Q26,-22 30,-3 Q34,-18 38,-2 Q42,-15 46,2 L46,10 L15,10Z" fill="#fbbf24" opacity="0.7"/>
  <path d="M20,2 Q23,-10 27,0 Q30,-12 34,2 Q37,-8 40,5 L40,10 L20,10Z" fill="#fef3c7" opacity="0.5"/>
</g>
<!-- Smoke columns -->
<g opacity="0.5">
  <ellipse cx="160" cy="25" rx="20" ry="12" fill="#1c1917" opacity="0.6"/>
  <ellipse cx="175" cy="15" rx="25" ry="14" fill="#1c1917" opacity="0.4"/>
  <ellipse cx="185" cy="5" rx="30" ry="10" fill="#292524" opacity="0.3"/>
  <ellipse cx="190" cy="35" rx="15" ry="8" fill="#1c1917" opacity="0.5"/>
</g>
<!-- Heat waves -->
<path d="M130,50 Q135,46 140,50 Q145,54 150,50" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.3"/>
<path d="M200,45 Q205,41 210,45 Q215,49 220,45" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.25"/>
<!-- Embers/sparks -->
<circle cx="155" cy="30" r="1.5" fill="#fbbf24" opacity="0.7"/>
<circle cx="170" cy="20" r="1" fill="#f59e0b" opacity="0.6"/>
<circle cx="180" cy="35" r="1.2" fill="#fbbf24" opacity="0.5"/>
<circle cx="145" cy="40" r="0.8" fill="#ef4444" opacity="0.6"/>
<circle cx="195" cy="25" r="1.3" fill="#fbbf24" opacity="0.4"/>
<!-- Road barrier -->
<g transform="translate(260,80)">
  <rect x="0" y="0" width="4" height="20" fill="#6b7280"/>
  <rect x="30" y="0" width="4" height="20" fill="#6b7280"/>
  <rect x="-2" y="4" width="38" height="6" rx="1" fill="#fbbf24"/>
  <rect x="-2" y="4" width="12" height="6" rx="1" fill="#1f2937"/>
  <rect x="22" y="4" width="12" height="6" rx="1" fill="#1f2937"/>
</g>
<!-- Silhouette person watching -->
<g transform="translate(320,62)">
  <circle cx="8" cy="0" r="5" fill="#1c1917"/>
  <rect x="3" y="5" width="10" height="18" rx="3" fill="#1c1917"/>
  <rect x="0" y="10" width="6" height="3" rx="1" fill="#1c1917" transform="rotate(-20 3 11)"/>
  <rect x="10" y="10" width="6" height="3" rx="1" fill="#1c1917" transform="rotate(15 13 11)"/>
  <rect x="3" y="22" width="4" height="10" fill="#1c1917"/>
  <rect x="9" y="22" width="4" height="10" fill="#1c1917"/>
</g>
<g transform="translate(345,65)">
  <circle cx="6" cy="0" r="4" fill="#1c1917"/>
  <rect x="2" y="4" width="8" height="15" rx="2" fill="#1c1917"/>
  <rect x="2" y="18" width="3" height="9" fill="#1c1917"/>
  <rect x="7" y="18" width="3" height="9" fill="#1c1917"/>
</g>
<!-- Fire truck siren reflections on road -->
<ellipse cx="170" cy="105" rx="40" ry="6" fill="#f59e0b" opacity="0.1"/>
</svg>

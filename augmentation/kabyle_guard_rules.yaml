  feminine_nouns:
    - "fille"
    - "femme"
    - "mra"
    - "teqchicht"
    - "tamghart"
    - "tametut"

  masculine_nouns:
    - "homme"
    - "garcon"
    - "argaz"
    - "amghar"
    - "aqchich"

  arabizi_markers:
    - "3"
    - "7"
    - "9"
    - "gh"
    - "ch"
    - "th"

regex:
  forbidden_unicode:
    - "ɣ"
    - "ɛ"
    - "ḥ"
    - "ʃ"
    - "θ"
    - "ṭ"
    - "ḍ"
    - "ẓ"
    - "ṣ"
  forbidden_sequences:
    - "\xc3"
    - "\xe2\x80\x99"
    - "\xe2\x80\x9c"
    - "\xe2\x80"
    - "\xe2\x80\x93"
    - "\xe2\x80\x94"
    - "\xef\xbf\xbd"
  negation_token: "\\b(?:ur|ul)\\b"    # now matches BOTH ur AND ul (Béjaïa)
  negation_closure: "\\b(?:ara|ula)\\b"  # now matches BOTH ara AND ula (Béjaïa)

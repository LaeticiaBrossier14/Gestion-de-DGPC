    - "ich3el"
    - "thech3el"
    - "tkard"
    - "iterteq"
    - "terteq"
    # Accident
    - "t-qleb"
    - "teqleb"
    - "iwthit"
    - "thewthit"
    - "iblessi"
    - "irez"
    # Movement/action
    - "teddu"
    - "arwa7"
    - "arwah"
    - "azlem"
    - "3ajlem"
    - "activiw"
    # Hybrid/French verbs in Kabyle matrix
    - "evacuer"
    - "hospitaliser"
    - "transporter"
    # Darija verbs (for ~15% Darija calls)
    - "drab"
    - "dharb"
    - "ta7"
    - "wqa3"

  medical_verbs:
    - "ighli"
    - "ghli"
    - "theghli"
    - "doukh"
    - "idukh"
    - "yugh"
    - "ithyughen"
    - "nuffes"
    - "respir"
    - "it-respirer"
    - "tfit"       # tfit la crise
    - "crise"
    - "malaise"
    - "tension"
    - "malade"
    - "marid"
    - "hallek"

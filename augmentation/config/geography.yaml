# ----------------------------------------------------------
# HOUSING TYPES  (frequently mentioned in calls)
# ----------------------------------------------------------
housing_types:
  - pattern: "{n} logements"
    examples: ["140 logements", "1000 logements", "2550 logements", "3200 logements", "600 logements"]
  - pattern: "cité {name}"
    examples: ["cité Djamaa", "cité Monja", "cité CNS", "cité AADL", "cité Tobbal"]
  - pattern: "l'social"
    note: "logement social — very frequentin Béjaïa"
  - pattern: "l'résidence {name}"
    examples: ["l'résidence Soummam", "l'résidence Belkour"]


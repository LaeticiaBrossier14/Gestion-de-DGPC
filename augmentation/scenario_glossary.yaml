# ============================================================================
# Scenario Glossary — Bilingual concept→Kabyle Arabizi (ENRICHED v2)
# ============================================================================
# Architecture: incident_type → concepts (FR/EN) → verified Kabyle forms
# Each verb includes: infinitif, il/elle forms, pluriel, négatif, intensif
# Enriched with native speaker knowledge + bilingual dictionary + corpus
# ============================================================================

_common:
  greetings: [allo, salam, salam alaykoum, azul, sbah lkhir, msa lkhir, salam 3likoum]
  closings: [saha, sahit, daccord, merci, bslama, shukran, ya3tik sa7a, barak Allahu fik, tanmirt]
  discourse:
    oui: [ih, an3am, wah, iyeh]
    non: [khati, xati, la, ala]
    svp: [3afak, svp, allah yerham babak, la3nayak, ma3lich, lu3aghawend]
    vite: [s zerb, zerb, vite, ta3jil, 3edjled, fissa, azlem, azlemd, 3ajlem, activiw]
    ici: [dayi, dagi, dagi-ni, daghi]
    maintenant: [tura, doka, dukha]
    un_peu: [chwiya, cway]
    comment: [amek, wach, kifach]
    où: [anda, win, wani, anida]
    quoi: [dachu, acu, d acu, dachou]
    beaucoup: [attas, bezaf, bezzaf]
    il_y_a: [yella, thella, kayen, llan, illa]
    il_n_y_a_pas: [ulach, wlach, ma kayen-ch, ur yelli ara]
    aussi: [dagheni, thani, hatta]
    encore: [mazal, la3ad]
    déjà: [yagi, dagi]
    peut_être: [waqila, balak, ahat]
    daccord: [dakur, dakour, daccord, okay]
    pauvre: [meskin, meskint]
  negation:
    ne_pas: ["ur {verbe} ara", "ul {verbe} ula", "ul {verbe} ani"]
    # EOR distribution (ASSOU 2021): ul...ula = 13/19 parlers (centre+est), ur...ara = 6/19 (extrémités+ouest)
    # ul...ani = Ait Bourman, Tagouba (rare variant)
    ce_n_est_pas: [machi, maci]
    non: [khati, xati]
    rien: [walu, ulac, wlac]
    jamais: [ur zri, 3umr]
  pronouns_eor:
    # EOR-specific pronoun forms confirmed by ASSOU 2021 thesis
    you_masc: [cekk, cekkina, kechch]  # cekk = 14/19 EOR parlers; kechch = 5/19 (extremities+west)
    you_fem: [cemm, cemmina, kemm, kemmina]  # cemm = 12/19 EOR; kemm = 7/19 (Aokas+extremities)
    comme_ca: [anken, akken, haken, anka, akka]  # anken = 9/19; akken = 5/19; haken = Melbou/Ait Segoual/Leâlam
  numbers:
    one: [yiwen, yiwet]
    two: [sin, snat]
    three: [tlata, krad, kradet]
    four: [reb3a, kuzt]
    five: [khemsa, semmus]

  # --- Operator standard formulas (from real calls DNA analysis) ---
  operator_formulas:
    opening:
      - "l'7imaya l'madaniya f l'istima3"
      - "m3akoum l'7imaya l'madaniya"
      - "l'7imaya l'madaniya an3am"
      - "les pompiers n Bgayet an3am"
    questions:
      - "anda exact?"
      - "dachu yellan?"
      - "anwa l'bloc?"
      - "wach la commune?"
      - "d-achu illan?"
      - "est-ce qu'il est conscient?"
      - "sh7al n l'blessés?"
      - "amek l'adresse exact?"
      - "ach7al n l'véhicules?"
    dispatch:
      - "d'accord, adencheye3 l'ambulance"
      - "aqlagh ntteddu-d"
      - "attassed  l'ambulance"
      - "tura attawedt l'ambulance"
    redirect:
      - "ak-defkegh numéro n {poste}"
      - "marki ghorek"
      - "marki 3endek"
    close:
      - "d'accord a gma"
      - "d'accord a madame"
      - "d'accord a sidi"
      - "sa7it"
      - "ya3tik sa7a"

  # --- Panic expressions (from real calls — stress=panic) ---
  panic_expressions:
    cries: [rwahemm, ya rebbi, ahhhh, wallah, ya latif]
    repeated: ["allo allo allo", "azlemd azlemd", "s'il vous plaît s'il vous plaît", "arwa7u arwa7u"]
    interjections: ["secours!", "urgent!", "mortel!", "grave!"]
    operator_calm: ["asber a madame", "Madame s'te plaît", "r'houm l'temma", "asber"]

  # --- Darija markers (for ~15% Darija-dominant callers) ---
  darija_markers:
    there_is: [kayen, kayna]
    what: [wesh, washnou]
    i_am: [rani, rana]
    brother: [khouya, ya khouya,sahbi]
    how: [kifach, kifah]
    where: [win, winou]
    i_want: [bghit, n7eb,madabiya]
    we_have: [3endna, ghourneghg]
    send: [aba3thou, arsal]
    please: [rebi i7afdek, allah ijazik]

  # --- Redirect posts (real phone numbers from actual calls) ---
  redirect_posts:
    oued_ghir: "030 16 92 00"
    el_kseur: "034 82 35 00"
    sidi_aich: "034 86 00 80"
    souk_el_tenine: "034 09 36 00"
    kherrata: "034 18 51 00"
    aokas: "034 84 31 00"
    akbou: "034 18 75 00"
    amizour: "034 08 00 14"
    tichy: "034 81 00 58"
    tazmalt: "034 08 00 86"
    beni_maouche: "034 00 42 91"
    seddouk: "034 00 60 87"

  evacuation:
    besoin_ambulance: [nehwaj l'ambulance,ilqa l'ambulance, chey3emd l'ambulance, netnadi l'ambulance, nebra l'ambulance]
    besoin_pompiers: [nhewaj pompier, ilaq les pompiers, netnad les pompiers, chey3emd les pompiers, khoussen les pompier]
    besoin_police: [la3imth i la police, la3id i la police, ssawlemth i la police, ehder i la police, 3eyet i la police, nadith i la police]
    evacuer: [frem ikel, rewlem, efrem, rouhem, be3dem, wekhrem ssina]
    sauvetage: [sselkiyi, 3awniyi, zegriyid ighil, fkiyid afuss]
    bloque: [iwhel, ihssel, ihwaj lem3awna, ikwanssi, ibele3 fellase]
  etat_psy:
    panique: [itergigi sel khel3a, ikhele3, ifja3]
    confusion: [ifehmara, iterouch, ifrith le3qel, amheboul]
    agressif: [imghoundef, iw3er, ihbel, iraji]
  localisation:
    a_domicile: [sakham, gamkan]
    sur_route: [gebrid, fetriq, zeth abrid, ssedaw webrid]
    en_montagne: [tazga, lghaba, dewar, tamourth, tadarth]
    en_mer: [lebher, chet]
  meteo:
    pluie: [gira, lehwa, aghebar, agfour]
    vent: [abehri, atu, adu]
    neige: [hesslen gedfel, adfel]
    visibilite: [italayara bien, koulech flou, inqess oussekoud, oulach la visibilité]
  personnes:
    une_personne: [l3ebd, bnadem, inssan, wahed]
    plusieurs_personnes: [l3ibad, lghachi, bezzaf l3ibad, atass l3ibad, hawla]
  temporel:
    hier: [idelli]
    aujourd_hui: [assa, ass-a, lyoum]
    demain: [azekka, gheda]
    maintenant: [tura, doka, dukha, dagi]
    ce_matin: [n toufat, ssba7, ssbah]
    ce_soir: [n temeddit, l3chiya, tameddith, ta3ecwit]
    la_nuit: [n yidh, llilet, ghidh]
    tout_a_l_heure: [qbel, qbel cway, dagi cway]
    vite: [s zerb, zerb, fissa, 3edjled]



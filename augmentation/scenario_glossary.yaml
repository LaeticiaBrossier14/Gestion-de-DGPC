      - ghlas tawla   # la fièvre est forte
    crier:
      - itt3eyit      # il crie
      - tett3eyit     # elle crie
      - le3yat        # les cris / il hurle
      - yettru        # il pleure
      - tettru        # elle pleure
    ne_bouge_pas:
      - ur yettharrek ara    # il ne bouge pas
      - ur yezmir ara        # il ne peut pas
      - ur tezmir ara        # elle ne peut pas
      - ur yezmir ad yekker  # il ne peut pas se lever
    se_lever:

      - ad iqreh      # ça va faire mal
    vertige:
      - doukh         # infinitif
      - yeddukh       # il a des vertiges
      - teddukh       # elle a des vertiges
      - yetteddukhuy  # il a le vertige (intensif)
    respirer:

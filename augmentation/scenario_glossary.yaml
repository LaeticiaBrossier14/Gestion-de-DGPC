      - yeghli        # il est tombé
      - teghli        # elle est tombée
      - neghli        # nous sommes tombés
      - ghlin         # ils sont tombés
      - igghli        # il tombe (intensif)
      - ur yeghli ara # il n'est pas tombé
      - ad yeghli     # il va tomber (OC, 6/19 extremities+west)
      - di yeghli     # il va tomber (EOR/Béjaïa, 13/19 parlers)
      - da yeghli     # il va tomber (Melbou/Ait Segoual/Leâlam)
      - yetteghliy    # il tombe (habitude)
    avoir_mal:
      - qreh          # infinitif
